<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Violin Maestro V52 - Score Perfect</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --pink: #ffb3e6; --sparkle: #fff; --hit-glow: rgba(255, 255, 255, 0.8); }
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; height: 100dvh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        /* 영상과 흡사한 블링블링 배경 */
        canvas { 
            background: linear-gradient(135deg, #ff99cc 0%, #ffcce6 50%, #ccf2ff 100%); 
            width: 100%; height: 100%; max-width: 500px;
        }

        .ui-layer { position: absolute; top: 0; left: 50%; width: 100%; height: 100%; max-width: 500px; transform: translateX(-50%); pointer-events: none; z-index: 10; }
        #lobby, #result { pointer-events: auto; background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(20px); display: flex; flex-direction: column; padding: 30px; color: #fff; height: 100%; width: 100%; justify-content: center; }
        
        h1 { text-align: center; font-size: 26px; font-weight: 900; text-shadow: 0 0 20px #ff66cc; margin-bottom: 20px; }
        #song-list { flex: 1; overflow-y: auto; background: rgba(0,0,0,0.1); border-radius: 20px; padding: 10px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.4); }
        .song-item { padding: 15px; border-radius: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.3); display: flex; justify-content: space-between; align-items: center; transition: 0.3s; color: #333; }
        .song-item.active { background: #fff; color: #ff66cc; font-weight: 900; box-shadow: 0 0 15px #fff; }
        
        .btn { width: 100%; padding: 20px; border-radius: 50px; border: none; font-size: 20px; font-weight: 900; background: #fff; color: #ff66cc; cursor: pointer; pointer-events: auto; }
        
        #game-ui { display: none; padding: 25px; height: 100%; width: 100%; position: relative; }
        #score-display { text-align: center; font-size: 60px; font-weight: 900; color: #fff; text-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-top: 40px; }
        #timer { position: absolute; top: 40px; right: 40px; font-size: 22px; font-weight: 900; color: #fff; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div class="ui-layer">
    <div id="lobby">
        <h1>VIOLIN CONCERT ✨</h1>
        <div id="song-list"></div>
        <button id="start-btn" class="btn">연주 시작 ✨</button>
    </div>

    <div id="game-ui">
        <div id="timer">02:00</div>
        <div id="score-display">0</div>
    </div>

    <div id="result" style="display:none; text-align:center;">
        <h1 id="res-title">공연 종료 ✨</h1>
        <div id="final-score" style="font-size: 70px; font-weight: 900; margin: 25px 0;">0</div>
        <button id="retry-btn" class="btn">다시 하기</button>
    </div>
</div>

<script>
    // 🎻 소희님이 주신 악보 이미지 완벽 반영 데이터
    const songs = [
        { 
            t: "작은 별 (Twinkle Full)", lv: "하", 
            // 도도솔솔라라솔(장) - 파파미미레레도(장) - 솔솔파파미미레(장) - 솔솔파파미미레(장) - 도도솔솔라라솔(장) - 파파미미레레도(장)
            p: "C4,C4,G4,G4,A4,A4,G4,F4,F4,E4,E4,D4,D4,C4,G4,G4,F4,F4,E4,E4,D4,G4,G4,F4,F4,E4,E4,D4,C4,C4,G4,G4,A4,A4,G4,F4,F4,E4,E4,D4,D4,C4",
            isLong: false
        },
        { 
            t: "Vivaldi: Spring (2min)", lv: "상", 
            p: "E5,E5,E5,D5,C5,G4,G4,C5,D5,E5,D5,C5,G4,G4,C5,D5,E5,F5,E5,D5,C5,G5,G4,G4,C5,D5,E5,D5,C5,G5,G5,G5,F5,E5,D5,D5,D5,C5,B4,A4,G4,G4,G5,B5,G5,B5,G5,B5,A5,G5,F#5,G5,A5,D5,F#5,D5,F#5,D5,F#5,E5,D5,C#5,D5,E5,A4,C5,E5,A5,B5,A5,G5,F#5,G5,E5,D5,C5,B4,A4,G4,G4,C5,D5,E5,D5,C5,E5,E5,E5,D5,C5,G4,B4,D5,F5,A5,G5,F5,E5,D5,C5",
            isLong: true 
        }
    ];

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let violin, lives = 6, score = 0, speed = 4, isPlaying = false, selected = 0;
    let tiles = [], nextNoteIndex = 0, startTime, particles = [], bgStars = [];

    function resize() {
        canvas.width = Math.min(window.innerWidth, 500);
        canvas.height = window.innerHeight;
        bgStars = [];
        for(let i=0; i<30; i++) bgStars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*3+1, s: Math.random()*0.8+0.2 });
    }
    window.addEventListener('resize', resize);
    resize();

    const hall = new Tone.Reverb({ decay: 4, wet: 0.5 }).toDestination();
    violin = new Tone.Sampler({
        urls: { "G4": "G4.mp3", "C5": "C5.mp3", "E5": "E5.mp3", "G5": "G5.mp3", "A5": "A5.mp3", "D6": "D6.mp3" },
        release: 1.5,
        baseUrl: "https://gleitz.github.io/midi-js-soundfonts/FatBoy/violin-mp3/",
        onload: () => { document.getElementById('start-btn').innerText = "연주 시작 ✨"; }
    }).connect(hall);

    function spawnTile(yPos) {
        const songNotes = songs[selected].p.split(',');
        // 악보의 끝이면 더 이상 생성 안 함 (짧은 곡)
        if (nextNoteIndex >= songNotes.length && !songs[selected].isLong) return;

        const note = songNotes[nextNoteIndex % songNotes.length];
        tiles.push({ lane: Math.floor(Math.random() * 4), y: yPos || -canvas.height/4, h: canvas.height/4, note: note, hit: false });
        nextNoteIndex++;
    }

    function animate() {
        if(!isPlaying) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. 블링블링 배경 (눈부신 파티클)
        bgStars.forEach(star => {
            star.y += star.s; if(star.y > canvas.height) star.y = -10;
            ctx.fillStyle = "rgba(255, 255, 255, 0.6)";
            ctx.beginPath(); ctx.arc(star.x, star.y, star.r, 0, Math.PI*2); ctx.fill();
        });

        // 2. 시간 처리
        let elapsed = (Date.now() - startTime) / 1000;
        let rem = Math.max(0, 120 - elapsed);
        document.getElementById('timer').innerText = `${Math.floor(rem/60).toString().padStart(2,'0')}:${Math.floor(rem%60).toString().padStart(2,'0')}`;
        
        // 3. 타일 처리
        for(let i = tiles.length - 1; i >= 0; i--) {
            const t = tiles[i];
            t.y += speed;
            const x = t.lane * canvas.width/4;

            if(t.hit) {
                ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
                ctx.fillRect(x, t.y, canvas.width/4, t.h);
            } else {
                ctx.fillStyle = "rgba(0, 0, 0, 0.9)";
                ctx.fillRect(x + 3, t.y + 3, canvas.width/4 - 6, t.h - 6);
                ctx.strokeStyle = "rgba(255,255,255,0.2)";
                ctx.strokeRect(x + 3, t.y + 3, canvas.width/4 - 6, t.h - 6);
            }

            if(t.y > canvas.height) {
                if(!t.hit) lives--; 
                tiles.splice(i, 1);
                spawnTile(tiles.length > 0 ? tiles[tiles.length-1].y - canvas.height/4 : -canvas.height/4);
                if(lives <= 0) endConcert(false);
            }
        }

        // 악보가 끝났고 타일도 없으면 자동 종료 (짧은 곡 전용)
        if (!songs[selected].isLong && nextNoteIndex >= songs[selected].p.split(',').length && tiles.length === 0) {
            endConcert(true);
        }

        // 4. 터치 폭죽 효과
        particles.forEach((p, idx) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.03;
            if(p.life <= 0) particles.splice(idx, 1);
            else {
                ctx.fillStyle = `rgba(255, 255, 255, ${p.life})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
            }
        });

        speed += 0.0004;
        if(rem <= 0 && songs[selected].isLong) endConcert(true);
        if(isPlaying) requestAnimationFrame(animate);
    }

    function createExplosion(x, y) {
        for(let i=0; i<15; i++) {
            particles.push({ x: x, y: y, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, life: 1.0 });
        }
    }

    canvas.addEventListener('pointerdown', (e) => {
        if(!isPlaying) return;
        const rect = canvas.getBoundingClientRect();
        const tx = e.clientX - rect.left;
        const ty = e.clientY - rect.top;
        const lane = Math.floor(tx / (canvas.width / 4));

        let target = tiles.find(t => !t.hit && t.y + t.h > canvas.height * 0.45);
        if(target && target.lane === lane) {
            target.hit = true; score++;
            document.getElementById('score-display').innerText = score;
            createExplosion(tx, ty);
            violin.triggerAttackRelease(target.note, "2n");
        } else {
            lives--; if(lives <= 0) endConcert(false);
        }
    });

    function endConcert(win) {
        isPlaying = false;
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('result').style.display = 'flex';
        document.getElementById('res-title').innerText = win ? "앵콜! 완벽한 연주 ✨" : "연주 중단";
        document.getElementById('final-score').innerText = score;
    }

    function renderSongs() {
        const list = document.getElementById('song-list');
        list.innerHTML = "";
        songs.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = `song-item ${i === selected ? 'active' : ''}`;
            div.innerHTML = `<span>${s.t}</span><small>${s.lv}</small>`;
            div.onclick = () => { selected = i; renderSongs(); };
            list.appendChild(div);
        });
    }
    renderSongs();

    document.getElementById('start-btn').onclick = () => {
        Tone.start(); isPlaying = true; tiles = []; score = 0; lives = 6; nextNoteIndex = 0; startTime = Date.now();
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        for(let i=0; i<5; i++) spawnTile(canvas.height - (i + 1) * (canvas.height/4));
        animate();
    };
    document.getElementById('retry-btn').onclick = () => location.reload();
</script>
</body>
</html>
