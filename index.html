<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Violin Maestro V50</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --pink: #ff99cc; --gold: #ffd700; --purple: #cc99ff; }
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; height: 100dvh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        /* 화사한 핑크-퍼플 그라데이션 */
        canvas { background: linear-gradient(180deg, #ffb3e6 0%, #cc99ff 50%, #99ccff 100%); width: 100%; height: 100%; max-width: 500px; }

        .ui-layer { position: absolute; top: 0; left: 50%; width: 100%; height: 100%; max-width: 500px; transform: translateX(-50%); pointer-events: none; z-index: 10; }
        #lobby, #game-over { pointer-events: auto; background: rgba(255,255,255,0.3); backdrop-filter: blur(20px); display: flex; flex-direction: column; padding: 25px; color: #fff; height: 100%; width: 100%; justify-content: center; }
        
        h1 { text-align: center; font-size: 26px; font-weight: 900; text-shadow: 0 0 15px #fff; margin-bottom: 15px; }
        #song-list { flex: 1; overflow-y: auto; background: rgba(0,0,0,0.1); border-radius: 20px; padding: 10px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.4); }
        .song-item { padding: 12px 15px; border-radius: 12px; margin-bottom: 6px; background: rgba(255,255,255,0.2); display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; }
        .song-item.active { background: #fff; color: #ff66cc; font-weight: bold; border-color: #ff66cc; box-shadow: 0 0 10px #fff; }
        
        .lv-tag { font-size: 10px; padding: 3px 7px; border-radius: 10px; color: #fff; font-weight: 800; }
        .lv-하 { background: #4caf50; } .lv-중 { background: #2196f3; } .lv-상 { background: #f44336; }

        .btn { width: 100%; padding: 18px; border-radius: 50px; border: none; font-size: 18px; font-weight: 900; background: #fff; color: #ff66cc; cursor: pointer; pointer-events: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        #game-ui { display: none; padding: 20px; height: 100%; width: 100%; position: relative; }
        #score { text-align: center; font-size: 50px; font-weight: 900; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.2); margin-top: 40px; }
        #hearts { font-size: 20px; position: absolute; top: 30px; left: 30px; }
        #timer { position: absolute; top: 30px; right: 30px; font-size: 20px; font-weight: 900; color: #fff; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div class="ui-layer">
    <div id="lobby">
        <h1>VIOLIN CONCERT ✨</h1>
        <div id="song-list"></div>
        <button id="start-btn" class="btn">연주 시작하기</button>
    </div>

    <div id="game-ui">
        <div id="hearts">🎻🎻🎻🎻🎻🎻</div>
        <div id="timer">02:00</div>
        <div id="score">0</div>
    </div>

    <div id="game-over" style="display:none; text-align:center;">
        <h1>연주 종료 ✨</h1>
        <div id="final-score" style="font-size: 60px; font-weight: 900; margin: 20px 0;">0</div>
        <button id="retry-btn" class="btn">다시 시작</button>
    </div>
</div>

<script>
    // 🎻 15곡 리스트 (하, 중, 상) - 멜로디 시퀀스 최적화
    const songs = [
        // 하 (Easy)
        { t: "Twinkle Star", lv: "하", p: "C5,C5,G5,G5,A5,A5,G5,F5,F5,E5,E5,D5,D5,C5" },
        { t: "Edelweiss", lv: "하", p: "E5,G5,D6,C6,G5,F5,E5,E5,E5,F5,G5,A5,G5" },
        { t: "Amazing Grace", lv: "하", p: "G4,C5,E5,C5,E5,D5,C5,A4,G4,G4,C5,E5,C5,E5" },
        { t: "London Bridge", lv: "하", p: "G5,A5,G5,F5,E5,F5,G5,D5,E5,F5,G5" },
        { t: "Long Long Ago", lv: "하", p: "C5,C5,D5,E5,F5,G5,G5,A5,G5,F5,E5,D5,C5" },
        // 중 (Mid)
        { t: "Minuet in G", lv: "중", p: "D5,G4,A4,B4,C5,D5,G4,G4,E5,C5,D5,E5,F#5,G5" },
        { t: "The Swan", lv: "중", p: "G4,B4,D5,G5,F#5,E5,D5,B4,A4,G4,A4,B4,D5,A4,G4" },
        { t: "Humoresque", lv: "중", p: "G5,F#5,G5,E5,D5,B4,G4,A4,B4,D5,G5,F#5,G5,A5,D5" },
        { t: "Salut d'Amour", lv: "중", p: "E5,F#5,G5,A5,B5,C6,D6,B5,G5,E5,C5,A4,F#4,D4" },
        { t: "Gavotte", lv: "중", p: "D5,G5,F#5,G5,A5,G5,F#5,G5,B5,A5,G5,F#5,E5,D5" },
        // 상 (Hard)
        { t: "Winter (Vivaldi)", lv: "상", p: "F5,F5,F5,F5,F5,Ab5,G5,F5,E5,C5,F5,F5,F5,F5,Ab5,G5,F5,E5,C5" },
        { t: "Hungarian Dance", lv: "상", p: "A4,D5,F5,A5,G5,F5,E5,D5,A4,D5,F5,A5,G5,F5,E5,D5,C#5" },
        { t: "Turkish March", lv: "상", p: "B4,A4,G#4,A4,C5,D5,C5,B4,C5,E5,F5,E5,D#5,E5,G5,A5" },
        { t: "He's a Pirate", lv: "상", p: "D4,F4,G4,G4,G4,A4,Bb4,Bb4,Bb4,C5,A4,A4,G4,F4,F4,G4" },
        { t: "Zigeunerweisen", lv: "상", p: "C5,D5,Eb5,G5,C6,B5,C6,D6,G5,Eb5,D5,C5,B4,G4,C5,D5" }
    ];

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let violin, lives = 6, score = 0, speed = 4, isPlaying = false, selected = 0;
    let tiles = [], nextNoteIndex = 0, startTime, particles = [];

    function resize() {
        canvas.width = Math.min(window.innerWidth, 500);
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // 🎻 바이올린 사운드 튜닝: 리듬이 튀지 않게 어택과 릴리즈를 조절
    const hall = new Tone.Reverb({ decay: 4, wet: 0.4 }).toDestination();
    violin = new Tone.Sampler({
        urls: { "G4": "G4.mp3", "C5": "C5.mp3", "E5": "E5.mp3", "G5": "G5.mp3", "A5": "A5.mp3", "D6": "D6.mp3" },
        attack: 0.05, // 부드러운 시작
        release: 1.2, // 여운이 남게
        baseUrl: "https://gleitz.github.io/midi-js-soundfonts/FatBoy/violin-mp3/",
        onload: () => { document.getElementById('start-btn').innerText = "콘서트 시작 ✨"; }
    }).connect(hall);

    function spawnTile(yPos) {
        const songNotes = songs[selected].p.split(',');
        const note = songNotes[nextNoteIndex % songNotes.length];
        tiles.push({ 
            lane: Math.floor(Math.random() * 4), 
            y: yPos || -canvas.height/4, 
            h: canvas.height/4, 
            note: note, 
            hit: false 
        });
        nextNoteIndex++;
    }

    function createParticles(x, y) {
        for(let i=0; i<10; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8,
                life: 1.0, size: Math.random()*4+2
            });
        }
    }

    function animate() {
        if(!isPlaying) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 화사한 파티클 배경 효과
        ctx.fillStyle = "rgba(255,255,255,0.2)";
        for(let i=0; i<10; i++) {
            ctx.beginPath();
            ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, 1, 0, Math.PI*2);
            ctx.fill();
        }

        // 타일 렌더링
        for(let i = tiles.length - 1; i >= 0; i--) {
            const t = tiles[i];
            t.y += speed;
            const x = t.lane * canvas.width/4;

            if(t.hit) {
                ctx.fillStyle = "rgba(255, 255, 255, 0.4)"; // 눌린 타일
                ctx.fillRect(x, t.y, canvas.width/4, t.h);
            } else {
                ctx.fillStyle = "rgba(0, 0, 0, 0.8)"; // 기본 검은 타일
                ctx.fillRect(x + 2, t.y + 2, canvas.width/4 - 4, t.h - 4);
            }

            // 놓쳤을 때
            if(t.y > canvas.height && !t.hit) {
                lives--; document.getElementById('hearts').innerText = '🎻'.repeat(Math.max(0, lives));
                tiles.splice(i, 1); spawnTile(tiles[tiles.length-1].y - canvas.height/4);
                if(lives <= 0) endGame();
            } else if(t.y > canvas.height && t.hit) {
                tiles.splice(i, 1); spawnTile(tiles[tiles.length-1].y - canvas.height/4);
            }
        }

        // 별빛 파티클 애니메이션
        for(let i=particles.length-1; i>=0; i--) {
            let p = particles[i];
            p.x += p.vx; p.y += p.vy; p.life -= 0.03;
            if(p.life <= 0) particles.splice(i,1);
            else {
                ctx.fillStyle = `rgba(255, 255, 255, ${p.life})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            }
        }

        let elapsed = (Date.now() - startTime) / 1000;
        let rem = Math.max(0, 120 - elapsed);
        document.getElementById('timer').innerText = `${Math.floor(rem/60).toString().padStart(2,'0')}:${Math.floor(rem%60).toString().padStart(2,'0')}`;
        if(rem <= 0) endGame(true);

        speed += 0.0004;
        requestAnimationFrame(animate);
    }

    function endGame(win = false) {
        isPlaying = false;
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('game-over').style.display = 'flex';
        document.getElementById('final-score').innerText = score;
    }

    canvas.addEventListener('pointerdown', (e) => {
        if(!isPlaying) return;
        const rect = canvas.getBoundingClientRect();
        const tx = e.clientX - rect.left;
        const ty = e.clientY - rect.top;
        const lane = Math.floor(tx / (canvas.width / 4));

        // 가장 아래에 있는 안 눌린 타일 찾기
        let target = null;
        let maxDev = -1;
        tiles.forEach(t => {
            if(!t.hit && t.y + t.h > canvas.height * 0.4) {
                if(t.y > maxDev) { maxDev = t.y; target = t; }
            }
        });

        if(target && target.lane === lane) {
            target.hit = true; score++;
            document.getElementById('score').innerText = score;
            createParticles(tx, ty);
            // 🎻 연주가 튀지 않게 음표 재생
            violin.triggerAttackRelease(target.note, "2n");
        } else {
            lives--; document.getElementById('hearts').innerText = '🎻'.repeat(Math.max(0, lives));
            if(lives <= 0) endGame();
        }
    });

    function renderSongs() {
        const list = document.getElementById('song-list');
        list.innerHTML = "";
        songs.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = `song-item ${i === selected ? 'active' : ''}`;
            div.innerHTML = `<span>${s.t}</span><span class="lv-tag lv-${s.lv}">${s.lv}</span>`;
            div.onclick = () => { selected = i; renderSongs(); };
            list.appendChild(div);
        });
    }
    renderSongs();

    document.getElementById('start-btn').onclick = () => {
        Tone.start(); isPlaying = true; tiles = []; score = 0; lives = 6; nextNoteIndex = 0; startTime = Date.now();
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        for(let i=0; i<5; i++) spawnTile(canvas.height - (i + 1) * (canvas.height/4));
        animate();
    };
    document.getElementById('retry-btn').onclick = () => location.reload();
</script>
</body>
</html>
