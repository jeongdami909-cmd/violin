<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Violin Maestro V53 - Silk Legato</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --pink: #ffb3e6; --glow: #fff; --sub-blue: #ccf2ff; }
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; height: 100dvh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        canvas { 
            background: linear-gradient(180deg, #ff99cc 0%, #ffcce6 70%, #ccf2ff 100%); 
            width: 100%; height: 100%; max-width: 500px;
        }

        .ui-layer { position: absolute; top: 0; left: 50%; width: 100%; height: 100%; max-width: 500px; transform: translateX(-50%); pointer-events: none; z-index: 10; }
        #lobby, #result { pointer-events: auto; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(30px); display: flex; flex-direction: column; padding: 40px; color: #fff; height: 100%; width: 100%; justify-content: center; }
        
        h1 { text-align: center; font-size: 28px; font-weight: 900; text-shadow: 0 0 20px #ff66cc; margin-bottom: 25px; }
        #song-list { flex: 0.6; overflow-y: auto; background: rgba(255, 255, 255, 0.1); border-radius: 25px; padding: 10px; margin-bottom: 30px; border: 1px solid rgba(255, 255, 255, 0.4); }
        .song-item { padding: 18px; border-radius: 15px; margin-bottom: 10px; background: rgba(255, 255, 255, 0.3); display: flex; justify-content: space-between; align-items: center; color: #444; font-weight: 600; }
        .song-item.active { background: #fff; color: #ff66cc; font-weight: 900; box-shadow: 0 0 20px #fff; }
        
        .btn { width: 100%; padding: 22px; border-radius: 60px; border: none; font-size: 20px; font-weight: 900; background: #fff; color: #ff66cc; cursor: pointer; pointer-events: auto; box-shadow: 0 10px 30px rgba(255, 102, 204, 0.4); }
        
        #game-ui { display: none; height: 100%; width: 100%; position: relative; }
        #score-display { text-align: center; font-size: 70px; font-weight: 900; color: #fff; text-shadow: 0 4px 20px rgba(0,0,0,0.1); padding-top: 60px; }
        #timer { position: absolute; top: 50px; right: 40px; font-size: 24px; font-weight: 900; color: #fff; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div class="ui-layer">
    <div id="lobby">
        <h1>VIOLIN MAESTRO ✨</h1>
        <div id="song-list"></div>
        <button id="start-btn" class="btn">연주 시작 ✨</button>
    </div>

    <div id="game-ui">
        <div id="timer">02:00</div>
        <div id="score-display">0</div>
    </div>

    <div id="result" style="display:none; text-align:center;">
        <h1 id="res-title">공연 종료 ✨</h1>
        <div id="final-score" style="font-size: 80px; font-weight: 900; margin: 30px 0;">0</div>
        <button id="retry-btn" class="btn">대기실로 돌아가기</button>
    </div>
</div>

<script>
    const songs = [
        { t: "작은 별 (Full Score)", lv: "하", p: "C4,C4,G4,G4,A4,A4,G4,F4,F4,E4,E4,D4,D4,C4,G4,G4,F4,F4,E4,E4,D4,G4,G4,F4,F4,E4,E4,D4,C4,C4,G4,G4,A4,A4,G4,F4,F4,E4,E4,D4,D4,C4", isLong: false },
        { t: "Vivaldi: Spring (Legato)", lv: "상", p: "E5,E5,E5,D5,C5,G4,G4,C5,D5,E5,D5,C5,G4,G4,C5,D5,E5,F5,E5,D5,C5,G5,G4,G4,C5,D5,E5,D5,C5,G5,G5,G5,F5,E5,D5,D5,D5,C5,B4,A4,G4,G4,G5,B5,G5,B5,G5,B5,A5,G5,F#5,G5,A5,D5,F#5,D5,F#5,D5,F#5,E5,D5,C#5,D5,E5,A4,C5,E5,A5,B5,A5,G5,F#5,G5,E5,D5,C5,B4,A4,G4,G4,C5,D5,E5,D5,C5,E5,E5,E5,D5,C5,G4", isLong: true }
    ];

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let violin, lives = 6, score = 0, speed = 4, isPlaying = false, selected = 0;
    let tiles = [], nextNoteIndex = 0, startTime, particles = [], laneGlow = [0, 0, 0, 0];

    function resize() {
        canvas.width = Math.min(window.innerWidth, 500);
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // 🎻 뻣뻣함을 해결하는 핵심: 긴 릴리즈와 리버브 세팅
    const hall = new Tone.Reverb({ decay: 5, wet: 0.5 }).toDestination();
    violin = new Tone.Sampler({
        urls: { "G4": "G4.mp3", "C5": "C5.mp3", "E5": "E5.mp3", "G5": "G5.mp3", "A5": "A5.mp3", "D6": "D6.mp3" },
        release: 2.5, // 소리가 부드럽게 사라짐
        baseUrl: "https://gleitz.github.io/midi-js-soundfonts/FatBoy/violin-mp3/",
        onload: () => { document.getElementById('start-btn').innerText = "연주 시작 ✨"; }
    }).connect(hall);

    function spawnTile(yPos) {
        const songNotes = songs[selected].p.split(',');
        if (nextNoteIndex >= songNotes.length && !songs[selected].isLong) return;
        const note = songNotes[nextNoteIndex % songNotes.length];
        tiles.push({ lane: Math.floor(Math.random() * 4), y: yPos || -canvas.height/4, h: canvas.height/4, note: note, hit: false, scale: 1 });
        nextNoteIndex++;
    }

    function animate() {
        if(!isPlaying) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. 레인 글로우 (터치 시 화사한 빛)
        laneGlow.forEach((g, i) => {
            if(g > 0) {
                let grad = ctx.createLinearGradient(0, canvas.height, 0, 0);
                grad.addColorStop(0, `rgba(255, 255, 255, ${g * 0.4})`);
                grad.addColorStop(1, "rgba(255, 255, 255, 0)");
                ctx.fillStyle = grad;
                ctx.fillRect(i * canvas.width/4, 0, canvas.width/4, canvas.height);
                laneGlow[i] -= 0.05;
            }
        });

        // 2. 타일 렌더링 (소프트 디자인)
        tiles.forEach((t, i) => {
            t.y += speed;
            const x = t.lane * canvas.width/4;
            const padding = 6;

            if(t.hit) {
                ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
                ctx.fillRect(x, t.y, canvas.width/4, t.h);
            } else {
                ctx.shadowBlur = 15; ctx.shadowColor = "rgba(0,0,0,0.1)";
                ctx.fillStyle = "rgba(0, 0, 0, 0.85)";
                // 부드러운 타일 모양
                drawRoundedRect(ctx, x + padding, t.y + padding, canvas.width/4 - padding*2, t.h - padding*2, 10);
                ctx.shadowBlur = 0;
            }

            if(t.y > canvas.height) {
                if(!t.hit) lives--; 
                tiles.splice(i, 1);
                spawnTile(tiles.length > 0 ? tiles[tiles.length-1].y - canvas.height/4 : -canvas.height/4);
                if(lives <= 0) endConcert(false);
            }
        });

        // 3. 파티클 (별가루)
        particles.forEach((p, idx) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            if(p.life <= 0) particles.splice(idx, 1);
            else {
                ctx.fillStyle = `rgba(255, 255, 255, ${p.life})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            }
        });

        let elapsed = (Date.now() - startTime) / 1000;
        let rem = Math.max(0, 120 - elapsed);
        document.getElementById('timer').innerText = `${Math.floor(rem/60).toString().padStart(2,'0')}:${Math.floor(rem%60).toString().padStart(2,'0')}`;

        if(isPlaying) requestAnimationFrame(animate);
    }

    function drawRoundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
        ctx.fill();
    }

    canvas.addEventListener('pointerdown', (e) => {
        if(!isPlaying) return;
        const rect = canvas.getBoundingClientRect();
        const tx = e.clientX - rect.left;
        const ty = e.clientY - rect.top;
        const lane = Math.floor(tx / (canvas.width / 4));

        let target = tiles.find(t => !t.hit && t.y + t.h > canvas.height * 0.4);
        if(target && target.lane === lane) {
            target.hit = true; score++;
            document.getElementById('score-display').innerText = score;
            laneGlow[lane] = 1.0; // 화사하게 빛나는 효과
            createExplosion(tx, ty);
            violin.triggerAttackRelease(target.note, "2n");
        } else {
            lives--; if(lives <= 0) endConcert(false);
        }
    });

    function createExplosion(x, y) {
        for(let i=0; i<20; i++) {
            particles.push({ x: x, y: y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1.0, size: Math.random()*3+2 });
        }
    }

    function endConcert(win) {
        isPlaying = false;
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('result').style.display = 'flex';
        document.getElementById('final-score').innerText = score;
    }

    function renderSongs() {
        const list = document.getElementById('song-list');
        list.innerHTML = "";
        songs.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = `song-item ${i === selected ? 'active' : ''}`;
            div.innerHTML = `<span>${s.t}</span><small>${s.lv}</small>`;
            div.onclick = () => { selected = i; renderSongs(); };
            list.appendChild(div);
        });
    }
    renderSongs();

    document.getElementById('start-btn').onclick = () => {
        Tone.start(); isPlaying = true; tiles = []; score = 0; lives = 6; nextNoteIndex = 0; startTime = Date.now();
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        for(let i=0; i<5; i++) spawnTile(canvas.height - (i + 1) * (canvas.height/4));
        animate();
    };
    document.getElementById('retry-btn').onclick = () => location.reload();
</script>
</body>
</html>
