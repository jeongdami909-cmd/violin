<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Violin Maestro V67 - Final Authentic</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --gold: #d4af37; --pink: #ff85c0; --pearl: #ffffff; }
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #fff; height: 100dvh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        /* 밝고 눈부신 무대 배경 */
        canvas { 
            background: linear-gradient(135deg, #ffffff 0%, #fff0f5 50%, #fff9e6 100%); 
            width: 100%; height: 100%; max-width: 500px;
            box-shadow: 0 0 50px rgba(255, 133, 192, 0.15);
        }

        .ui-layer { position: absolute; top: 0; left: 50%; width: 100%; height: 100%; max-width: 500px; transform: translateX(-50%); pointer-events: none; z-index: 10; }
        #lobby, #result { pointer-events: auto; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(25px); display: flex; flex-direction: column; padding: 35px; color: #444; height: 100%; width: 100%; justify-content: center; }
        
        h1 { text-align: center; font-size: 26px; font-weight: 900; color: var(--pink); text-shadow: 1px 1px 3px rgba(255, 133, 192, 0.3); margin-bottom: 25px; }
        #song-list { flex: 1; overflow-y: auto; background: rgba(255, 255, 255, 0.6); border-radius: 25px; padding: 10px; margin-bottom: 25px; border: 1px solid #ffeef4; }
        .song-item { padding: 16px; border-radius: 15px; margin-bottom: 10px; background: #fff; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid #f0f0f0; transition: 0.2s; }
        .song-item.active { background: #fff5f8; border-color: var(--pink); color: var(--pink); font-weight: 900; }
        
        .lv-badge { font-size: 11px; padding: 4px 10px; border-radius: 12px; color: #fff; font-weight: 900; }
        .lv-하 { background: #b7e4c7; } .lv-중 { background: #ade8f4; } .lv-상 { background: #fca311; }

        .btn { width: 100%; padding: 22px; border-radius: 60px; border: none; font-size: 20px; font-weight: 900; background: var(--pink); color: #fff; cursor: pointer; pointer-events: auto; box-shadow: 0 8px 20px rgba(255,133,192,0.4); }
        
        #game-ui { display: none; height: 100%; width: 100%; position: relative; }
        #score-display { text-align: center; font-size: 65px; font-weight: 900; color: var(--pink); text-shadow: 0 4px 15px rgba(255,255,255,0.9); padding-top: 60px; }
        #progress-bar { width: 0%; height: 8px; background: var(--pink); box-shadow: 0 0 15px var(--pink); position: absolute; top: 0; left: 0; }
    </style>
</head>

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let violin, lives = 6, score = 0, speed = 3.2, accel = 0.0001, isPlaying = false, selected = 0;
    let tiles = [], nextNoteIndex = 0, startTime, particles = [], laneGlow = [0, 0, 0, 0];
    let prevLane = -1, lastNote = null;

    // 🎻 음 높이에 따른 지능형 레인 배치 (기차 방지)
    function getLaneFromNote(note) {
        const notes = ["G2","A2","B2","C3","D3","E3","F3","G3","A3","B3","C4","C#4","D4","Eb4","E4","F4","F#4","G4","Ab4","A4","Bb4","B4","C5","C#5","D5","Eb5","E5","F5","F#5","G5","Ab5","A5","Bb5","B5","C6","C#6","D6","Eb6","E6","F6","F#6","G6","Ab6","A6","Bb6","B6","C7","D7","E7","F7","G7","A7","B7","C8","D8","E8","F8","G8","A8","B8","C9"];
        let idx = notes.indexOf(note);
        if (idx === -1) idx = 30; // 기본값
        let lane = Math.floor((idx / notes.length) * 4);
        if (lane === prevLane) lane = (lane + 1) % 4; // 중복 레인 방지
        prevLane = lane;
        return lane;
    }

    function resize() {
        canvas.width = Math.min(window.innerWidth, 500);
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // 🎻 스트라디바리우스 사운드 복구 (MusyngKite 고해상도 샘플)
    // 지피티의 조언대로 뭉개짐 없는 선명한 소리를 위해 EQ 및 Reverb 조절
    const eq = new Tone.EQ3({ low: -10, mid: 2, high: 14 }).toDestination();
    violin = new Tone.Sampler({
        urls: { 
            "G3": "G3.mp3", "C4": "C4.mp3", "E4": "E4.mp3", "G4": "G4.mp3", 
            "C5": "C5.mp3", "E5": "E5.mp3", "G5": "G5.mp3", "C6": "C6.mp3" 
        },
        release: 1.0,
        baseUrl: "https://gleitz.github.io/midi-js-soundfonts/MusyngKite/violin-mp3/",
        onload: () => { document.getElementById('start-btn').innerText = "Authentic 연주 입장 ✨"; }
    }).connect(eq);

    function spawnTile(yPos) {
        const songNotes = songs[selected].p.split(',');
        const note = songNotes[nextNoteIndex % songNotes.length];
        const lane = getLaneFromNote(note);
        tiles.push({ lane: lane, y: yPos || -canvas.height/4, h: canvas.height/4, note: note, hit: false });
        nextNoteIndex++;
    }

    function animate() {
        if(!isPlaying) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        laneGlow.forEach((g, i) => {
            if(g > 0) {
                let grad = ctx.createLinearGradient(0, canvas.height, 0, 0);
                grad.addColorStop(0, `rgba(255, 133, 192, ${g * 0.4})`);
                grad.addColorStop(1, "rgba(255, 255, 255, 0)");
                ctx.fillStyle = grad; ctx.fillRect(i * canvas.width/4, 0, canvas.width/4, canvas.height);
                laneGlow[i] -= 0.05;
            }
        });

        tiles.forEach((t, i) => {
            t.y += speed;
            const x = t.lane * canvas.width/4;
            if(t.hit) {
                ctx.fillStyle = "rgba(255, 215, 0, 0.2)"; ctx.fillRect(x, t.y, canvas.width/4, t.h);
            } else {
                ctx.fillStyle = "#444"; // 화이트 무대 위 명확한 포인트
                drawRoundedRect(ctx, x + 10, t.y + 10, canvas.width/4 - 20, t.h - 20, 15);
            }

            if(t.y > canvas.height) {
                if(!t.hit) lives--; 
                tiles.splice(i, 1);
                spawnTile(tiles.length > 0 ? tiles[tiles.length-1].y - canvas.height/4 : -canvas.height/4);
                if(lives <= 0) endConcert(false);
            }
        });

        let elapsed = (Date.now() - startTime) / 1000;
        let progress = (elapsed / songs[selected].time) * 100;
        document.getElementById('progress-bar').style.width = Math.min(100, progress) + "%";
        if(progress >= 100 && tiles.every(t => t.hit || t.y > canvas.height)) endConcert(true);

        particles.forEach((p, idx) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.025;
            if(p.life <= 0) particles.splice(idx, 1);
            else {
                ctx.fillStyle = `rgba(255, 133, 192, ${p.life})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, Math.PI*2); ctx.fill();
            }
        });

        speed += accel;
        if(isPlaying) requestAnimationFrame(animate);
    }

    function drawRoundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath(); ctx.moveTo(x + radius, y); ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius); ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height); ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius); ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y); ctx.closePath(); ctx.fill();
    }

    canvas.addEventListener('pointerdown', (e) => {
        if(!isPlaying) return;
        const rect = canvas.getBoundingClientRect();
        const tx = e.clientX - rect.left;
        const ty = e.clientY - rect.top;
        const lane = Math.floor(tx / (canvas.width / 4));

        let target = tiles.find(t => !t.hit && t.y + t.h > canvas.height * 0.4);
        if(target && target.lane === lane) {
            target.hit = true; score++;
            document.getElementById('score-display').innerText = score;
            laneGlow[lane] = 1.0;
            for(let i=0; i<15; i++) particles.push({ x: tx, y: ty, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, life: 1.0 });
            
            // 🎻 모노 레가토 엔진: 이전 음 즉시 릴리즈 후 새 음 재생
            if (lastNote) violin.triggerRelease(lastNote);
            violin.triggerAttack(target.note);
            lastNote = target.note;

        } else {
            lives--; if(lives <= 0) endConcert(false);
        }
    });

    function endConcert(win) {
        isPlaying = false;
        if (lastNote) violin.triggerRelease(lastNote);
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('result').style.display = 'flex';
        document.getElementById('final-score').innerText = score;
    }

    function renderSongs() {
        const list = document.getElementById('song-list');
        list.innerHTML = "";
        songs.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = `song-item ${i === selected ? 'active' : ''}`;
            div.innerHTML = `<span>${s.t}</span><span class="lv-badge lv-${s.lv}">${s.lv}</span>`;
            div.onclick = () => { selected = i; renderSongs(); };
            list.appendChild(div);
        });
    }
    renderSongs();

    document.getElementById('start-btn').onclick = async () => {
        await Tone.start();
        isPlaying = true; tiles = []; score = 0; lives = 6; nextNoteIndex = 0; startTime = Date.now(); lastNote = null;
        
        const lv = songs[selected].lv;
        if(lv === "하") { speed = 3.2; accel = 0.00006; }
        else if(lv === "중") { speed = 4.2; accel = 0.00012; }
        else { speed = 5.4; accel = 0.00028; }

        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        for(let i=0; i<5; i++) spawnTile(canvas.height - (i + 1) * (canvas.height/4));
        animate();
    };
    document.getElementById('retry-btn').onclick = () => location.reload();
</script>
</body>
</html>
