<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Violin Maestro - Sparkling Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --neon-pink: #ff00ff; --gold: #ffd700; --light-blue: #00f2ff; }
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; height: 100dvh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        /* 블링블링 배경 그라데이션 */
        canvas { background: linear-gradient(135deg, #ff99cc 0%, #cc99ff 50%, #99ccff 100%); width: 100%; height: 100%; max-width: 500px; border-left: 2px solid rgba(255,255,255,0.3); border-right: 2px solid rgba(255,255,255,0.3); }

        .ui-layer { position: absolute; top: 0; left: 50%; width: 100%; height: 100%; max-width: 500px; transform: translateX(-50%); pointer-events: none; z-index: 10; display: flex; flex-direction: column; }
        #lobby, #game-over-screen { pointer-events: auto; background: rgba(255,255,255,0.2); backdrop-filter: blur(15px); display: flex; flex-direction: column; padding: 25px; color: #fff; height: 100%; justify-content: center; }
        
        h1 { text-align: center; font-size: 28px; font-weight: 900; text-shadow: 0 0 20px #fff; color: #fff; margin-bottom: 20px; }
        
        #song-list { flex: 1; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 20px; padding: 10px; margin: 15px 0; border: 1px solid rgba(255,255,255,0.3); }
        .song-item { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); border-radius: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.15); display: flex; justify-content: space-between; align-items: center; }
        .song-item.active { background: #fff; color: #ff66cc; font-weight: bold; box-shadow: 0 0 15px #fff; }
        
        .level-badge { font-size: 10px; padding: 4px 10px; border-radius: 20px; color: #fff; font-weight: 900; text-transform: uppercase; }
        .level-하 { background: #4caf50; } .level-중 { background: #2196f3; } .level-상 { background: #f44336; }

        .btn { width: 100%; padding: 20px; border-radius: 50px; border: none; font-size: 20px; font-weight: 900; background: #fff; color: #ff66cc; cursor: pointer; pointer-events: auto; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        #game-ui { display: none; padding: 20px; height: 100%; position: relative; }
        #timer { position: absolute; top: 30px; right: 30px; font-size: 22px; color: #fff; font-weight: 900; text-shadow: 0 0 10px rgba(0,0,0,0.3); }
        #score { text-align: center; font-size: 60px; font-weight: 900; color: #fff; text-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-top: 50px; }
        #hearts { font-size: 22px; position: absolute; top: 30px; left: 30px; text-shadow: 0 0 10px rgba(0,0,0,0.3); }
        #progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.3); position: absolute; bottom: 0; left: 0; }
        #progress-bar { width: 0%; height: 100%; background: #fff; box-shadow: 0 0 15px #fff; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div class="ui-layer">
    <div id="lobby">
        <h1>SPARKLING VIOLIN</h1>
        <div id="song-list"></div>
        <button id="start-btn" class="btn">악보 준비 완료 ✨</button>
    </div>

    <div id="game-ui">
        <div id="hearts">🎻🎻🎻🎻🎻🎻</div>
        <div id="timer">02:00</div>
        <div id="score">0</div>
        <div id="progress-container"><div id="progress-bar"></div></div>
    </div>

    <div id="game-over-screen" style="display:none; text-align:center;">
        <h1 id="result-title">Performance Over</h1>
        <div id="final-score" style="font-size: 70px; color: #fff; font-weight: 900; margin: 20px 0;">0</div>
        <button id="retry-btn" class="btn">다시 무대로 ✨</button>
    </div>
</div>

<script>
    const songs = [
        { t: "Twinkle Star", a: "Easy Melody", lv: "하", p: "C5,C5,G5,G5,A5,A5,G5,F5,F5,E5,E5,D5,D5,C5" },
        { t: "Minuet in G", a: "J.S. Bach", lv: "중", p: "D5,G4,A4,B4,C5,D5,G4,G4,E5,C5,D5,E5,F#5,G5,G4,G4" },
        { t: "Winter (Vivaldi)", a: "Hard Mastery", lv: "상", p: "F5,F5,F5,F5,F5,Ab5,G5,F5,E5,C5,F5,F5,F5,F5,Ab5,G5,F5,E5,C5,C6,C6,C6,C6" },
        { t: "La Campanella", a: "Liszt", lv: "상", p: "D#6,D#6,A#4,D#6,B4,D#6,D#5,D#6,D#4,D#6,A#4,C#6,F#4,B5,D#4" }
    ];

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let violin, lives = 6, score = 0, speed = 4, isPlaying = false, selected = 0;
    let tiles = [], nextNoteIndex = 0, startTime, particles = [], bgParticles = [];

    function resize() {
        canvas.width = Math.min(window.innerWidth, 500);
        canvas.height = window.innerHeight;
        // 배경 파티클 생성 (눈송이 느낌)
        bgParticles = [];
        for(let i=0; i<30; i++) bgParticles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*3+1, s: Math.random()*1+0.5 });
    }
    window.addEventListener('resize', resize);
    resize();

    const hall = new Tone.Reverb({ decay: 4, wet: 0.5 }).toDestination();
    violin = new Tone.Sampler({
        urls: { "G4": "G4.mp3", "C5": "C5.mp3", "E5": "E5.mp3", "G5": "G5.mp3", "A5": "A5.mp3", "D6": "D6.mp3" },
        release: 1.5,
        baseUrl: "https://gleitz.github.io/midi-js-soundfonts/FatBoy/violin-mp3/",
        onload: () => { document.getElementById('start-btn').innerText = "연주 시작 ✨"; }
    }).connect(hall);

    function spawnTile(yPos) {
        const songNotes = songs[selected].p.split(',');
        const note = songNotes[nextNoteIndex % songNotes.length];
        tiles.push({ lane: Math.floor(Math.random() * 4), y: yPos || -canvas.height/4, h: canvas.height/4, note: note, hit: false, glow: 0 });
        nextNoteIndex++;
    }

    function createParticles(x, y) {
        for(let i=0; i<15; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
                life: 1.0, color: `hsl(${Math.random()*60 + 180}, 100%, 80%)`
            });
        }
    }

    function animate() {
        if(!isPlaying) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. 배경 파티클 (눈송이/별빛)
        bgParticles.forEach(p => {
            p.y += p.s; if(p.y > canvas.height) p.y = -10;
            ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
        });

        // 2. 레인 구분선 (더 연하게)
        ctx.strokeStyle = "rgba(255,255,255,0.2)";
        for(let i=1; i<4; i++) {
            ctx.beginPath(); ctx.moveTo(i * canvas.width/4, 0); ctx.lineTo(i * canvas.width/4, canvas.height); ctx.stroke();
        }

        // 3. 타일 및 효과 렌더링
        for(let i = tiles.length - 1; i >= 0; i--) {
            const t = tiles[i];
            t.y += speed;
            const x = t.lane * canvas.width/4;

            if(t.hit) {
                // 눌린 타일 효과
                ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
                ctx.fillRect(x, t.y, canvas.width/4, t.h);
            } else {
                // 일반 타일 (영상처럼 블랙 느낌)
                ctx.fillStyle = "rgba(0, 0, 0, 0.85)";
                ctx.fillRect(x + 2, t.y + 2, canvas.width/4 - 4, t.h - 4);
                ctx.strokeStyle = "rgba(255,255,255,0.1)";
                ctx.strokeRect(x + 2, t.y + 2, canvas.width/4 - 4, t.h - 4);
            }

            if(t.y > canvas.height && !t.hit) {
                lives--; document.getElementById('hearts').innerText = '🎻'.repeat(Math.max(0, lives));
                tiles.splice(i, 1); spawnTile(tiles[tiles.length-1].y - canvas.height/4);
                if(lives <= 0) endConcert(false);
            } else if(t.y > canvas.height && t.hit) {
                tiles.splice(i, 1); spawnTile(tiles[tiles.length-1].y - canvas.height/4);
            }
        }

        // 4. 터치 파티클 애니메이션
        for(let i=particles.length-1; i>=0; i--) {
            let p = particles[i];
            p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            if(p.life <= 0) particles.splice(i,1);
            else {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        let elapsed = (Date.now() - startTime) / 1000;
        document.getElementById('timer').innerText = `${Math.floor((120-elapsed)/60).toString().padStart(2,'0')}:${Math.floor((120-elapsed)%60).toString().padStart(2,'0')}`;
        document.getElementById('progress-bar').style.width = (elapsed / 120 * 100) + "%";
        if(elapsed >= 120) endConcert(true);

        speed += 0.0004;
        requestAnimationFrame(animate);
    }

    canvas.addEventListener('pointerdown', (e) => {
        if(!isPlaying) return;
        const rect = canvas.getBoundingClientRect();
        const touchX = e.clientX - rect.left;
        const touchY = e.clientY - rect.top;
        const lane = Math.floor(touchX / (canvas.width / 4));

        let target = tiles.find(t => !t.hit && t.y + t.h > canvas.height * 0.4);
        if(target && target.lane === lane) {
            target.hit = true; score++;
            document.getElementById('score').innerText = score;
            createParticles(touchX, touchY); // 팡 터지는 반짝이!
            violin.triggerAttackRelease(target.note, "2n");
        } else {
            lives--; document.getElementById('hearts').innerText = '🎻'.repeat(Math.max(0, lives));
            if(lives <= 0) endConcert(false);
        }
    });

    function endConcert(win) {
        isPlaying = false;
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('game-over-screen').style.display = 'flex';
        document.getElementById('final-score').innerText = score;
    }

    function renderSongList() {
        const list = document.getElementById('song-list');
        list.innerHTML = "";
        songs.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = `song-item ${i === selected ? 'active' : ''}`;
            div.innerHTML = `<div><strong>${s.t}</strong><br><small>${s.a}</small></div><span class="level-badge level-${s.lv}">${s.lv}</span>`;
            div.onclick = () => { selected = i; renderSongList(); };
            list.appendChild(div);
        });
    }
    renderSongList();

    document.getElementById('start-btn').onclick = () => {
        Tone.start(); isPlaying = true; tiles = []; score = 0; lives = 6; nextNoteIndex = 0; startTime = Date.now();
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        for(let i=0; i<5; i++) spawnTile(canvas.height - (i + 1) * (canvas.height/4));
        animate();
    };
    document.getElementById('retry-btn').onclick = () => location.reload();
</script>
</body>
</html>
