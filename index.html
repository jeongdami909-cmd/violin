<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Piano Tiles - V66 Perfect Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --pink: #ffb3e6; --purple: #e6ccff; --gold: #ffea00; }
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; height: 100dvh; overflow: hidden; touch-action: none; display: flex; justify-content: center; align-items: center; }
        canvas { background: linear-gradient(180deg, #ff99f1 0%, #e6b2ff 100%); width: 100%; height: 100%; max-width: 500px; border-left: 1px solid rgba(255,255,255,0.2); border-right: 1px solid rgba(255,255,255,0.2); }
        .ui-layer { position: absolute; top: 0; left: 50%; width: 100%; height: 100%; max-width: 500px; transform: translateX(-50%); pointer-events: none; z-index: 10; display: flex; flex-direction: column; }
        #lobby { pointer-events: auto; background: rgba(0,0,0,0.7); display: flex; flex-direction: column; padding: 25px; color: #fff; height: 100%; backdrop-filter: blur(15px); }
        h1 { text-align: center; font-size: 22px; font-weight: 900; text-shadow: 0 0 10px var(--pink); padding: 15px 0; }
        #difficulty-box { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .diff-btn { padding: 10px 15px; font-size: 14px; font-weight: bold; border-radius: 30px; border: 2px solid #fff; background: rgba(0,0,0,0.3); color: #fff; cursor: pointer; }
        .diff-btn.active { background: var(--pink); border-color: var(--pink); box-shadow: 0 0 10px var(--pink); }
        #song-list { flex: 1; overflow-y: auto; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 10px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .song-item { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); border-radius: 12px; margin-bottom: 8px; background: rgba(0,0,0,0.3); color: #ddd; font-weight: bold; }
        .song-item.active { background: #fff; color: #ff66cc; border: 2px solid var(--pink); }
        #start-btn { width: 100%; padding: 22px; border-radius: 50px; font-size: 20px; font-weight: 900; background: #fff; color: #ff66cc; border: none; cursor: pointer; pointer-events: auto; }
        #game-ui { display: none; padding: 20px; height: 100%; position: relative; }
        #score { text-align: center; font-size: 70px; font-weight: 900; color: #fff; text-shadow: 0 4px 10px rgba(255,0,150,0.5); padding-top: 45px; }
        #hearts { font-size: 18px; color: #fff; position: absolute; top: 20px; left: 15px; text-shadow: 0 2px 5px rgba(0,0,0,0.5); letter-spacing: -2px; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div class="ui-layer">
    <div id="lobby">
        <h1>SYNC MAESTRO 16</h1>
        <div id="difficulty-box">
            <button class="diff-btn" data-diff="하">하 (❤️x10)</button>
            <button class="diff-btn active" data-diff="중">중 (❤️x10)</button>
            <button class="diff-btn" data-diff="상">상 (❤️x10)</button>
        </div>
        <div id="song-list"></div>
        <button id="start-btn">완벽한 조율 완료!</button>
    </div>
    <div id="game-ui">
        <div id="hearts">❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️</div>
        <div id="score">0</div>
    </div>
</div>

<script>
    // 🎹 원곡 멜로디 100% 이식 (Summer, 라 캄파넬라 등 16곡)
    const songs = [
        { t: "Summer", a: "Joe Hisaishi", p: "D4,G4,A4,B4,A4,G4,D4,G4,A4,B4,D5,G4,E4,C5,B4,A4,G4,D4,G4,A4,B4,A4,G4,D4,G4,A4,B4,C5,B4,A4,G4,G4|B4,A4|C5,B4|D5,C5|E5,D5|F#5,E5|G5,D5|B5,C5|A5,B4|G5,A4|F#5,G4|D5,F#4|C5,G4|B4".repeat(5) },
        { t: "La Campanella", a: "Liszt", p: "D#6|D#4,D#6|D#4,D#6|A#4,D#6|B4,D#6|D#5,D#6|D#4,D#6|A#4,C#6|F#4,B5|D#4,A#5|F4,G#5|D#4,F#5|B3,E5|G#3,D#5|D#3,D#6|D#4,F#6|F#4,A#6|A#4,D#7|D#5,C#7|G#5,B6|F#5,A#6|E5,G#6|D#5,F#6|C#5".repeat(5) },
        { t: "Wedding March", a: "Mendelssohn", p: "F4|A3|C4,F4|A3|C4,F4|A3|C4,F4|C3|F3,A4|F3|A3,C5|A3|C4,F5|C4|F4,F4|A3|C4,G4|B3|D4,C5|E4|G4,A4|C4|E4,G4|B3|D4,F4|A3|C4,E4|G3|C4,D4|F3|A3,C4|E3|G3,F4|A3|C4,F4|A3|C4,F4|A3|C4".repeat(8) },
        { t: "Piano Concerto No.2", a: "Rachmaninoff", p: "F2|C3|F3|G#3,G2|C3|G3|A#3,G#2|C3|G#3|C4,A#2|C3|A#3|C#4,C3|G3|C4|E4,F2|C3|F3|G#3,C3|G3|C4|E4,F#2|C#3|F#3|A3,G#2|D#3|G#3|B3,A#2|F3|A#3|C#4,G#2|D#3|G#3|B3,C#2|G#2|C#3|F3".repeat(6) },
        { t: "River Flows in You", a: "Yiruma", p: "F#5|F#3,E5|A3,F#5|C#4,C#5|F#4,F#5|D3,E5|A3,F#5|D4,C#5|A4,A5|A3,G#5|E4,F#5|C#4,E5|A3,D5|D3,C#5|A3,F#5|F#3,E5|A3,F#5|C#4,C#5|F#4,D5|D3,E5|A3,F#5|D4,A5|A4".repeat(5) },
        { t: "Für Elise", a: "Beethoven", p: "E5|A2,D#5|E3,E5|A3,D#5|C4,E5|E4,B4|A2,D5|E3,C5|A3,A4|A2,C4|E3,E4|A3,A4|C4,B4|E3,E4|G#3,G#4|B3,A4|C4,E5|A2,D#5|E3,E5|A3,D#5|C4,E5|E4,B4|A2,D5|E3,C5|A3,A4|A2".repeat(6) },
        { t: "Turkish March", a: "Mozart", p: "B4|A2,A4|E3,G#4|A3,A4|C4,C5|A2,D5|E3,C5|A3,B4|C4,A4|A2,B4|E3,C5|A3,D5|C4,E5|E2,F5|A2,E5|E3,D#5|C4,E5|A2,A5|E3,C6|A3,A5|C4,G#5|E4,A5|A4,B5|A2,A5|E3,A4|A3,B4|B3,C5|C4,D5|D4".repeat(6) },
        { t: "Winter Wind", a: "Chopin", p: "A5|A3,G#5|C4,A5|E4,F5|A4,E5|C5,D#5|E5,E5|A5,C5|C6,B4|E6,A#4|A6,B4|C7,G4|E7,A#4|D7,A4|C7,G#4|B6,A#4|A6,G#4|B6,A4|A6,C5|E7,B4|D7,A4|C7,G#4|B6,A4|A6".repeat(5) },
        { t: "Clair de Lune", a: "Debussy", p: "F5|Db3,Eb5|Ab2,Db5|Db2,Ab4|F2,F4|Db2,Db4|Ab1,Eb4|Eb2,Db4|Db2,Ab4|F2,F4|Db2,F5|Db3,Eb5|Ab2,Db5|Db2,Ab4|F2,F4|Db2,F5|Db3,Eb5|Ab2,Db5|Db2,Ab4|F2".repeat(6) },
        { t: "Canon in D", a: "Pachelbel", p: "F#5|D3,E5|A2,D5|B2,C#5|F#2,B4|G2,A4|D2,B4|G2,C#5|A2,D5|D3,C#5|A2,B4|B2,A4|F#2,G4|G2,F#4|D2,G4|G2,A4|A2,F#4|D2,E4|A2,D4|D2,C#4|A1,B4|B2,A4|A2,G4|G2,F#4|F#2".repeat(5) },
        { t: "Nocturne Op.9 No.2", a: "Chopin", p: "G4|Eb3,G5|G3,F5|Bb3,G5|Eb4,Eb5|G3,D5|Bb3,C5|Eb3,Bb4|G3,Ab4|F3,G4|Eb3,F4|D3,Eb4|Eb2,C5|Ab2,Eb5|Eb3,D5|Bb3,Eb5|Eb4,G4|Eb3,G5|G3,F5|Bb3,G5|Eb4".repeat(6) },
        { t: "Moonlight Sonata", a: "Beethoven", p: "G#3|C#2,C#4|G#2,E4|C#3,G#3|C#2,C#4|G#2,E4|C#3,A3|A1,C#4|E2,F#4|A2,G#3|G#1,C#4|D#2,F#4|G#2,F#3|F#1,C#4|E2,F#4|A2,G#3|C#2,C#4|G#2,E4|C#3".repeat(6) },
        { t: "Take On Me", a: "a-ha", p: "F#5|Bm2,F#5|Bm3,D5|E2,B4|E3,B4|A2,E5|A3,E5|D2,E5|D3,G#5|E2,G#5|E3,A5|A2,A5|A3,G#5|E2,G#5|E3,F#5|D2,F#5|D3,E5|A2,E5|A3,F#5|Bm2,F#5|Bm3".repeat(8) },
        { t: "Still D.R.E.", a: "Dr. Dre", p: "E5|C4|A4,E5|C4|A4,E5|C4|A4,E5|B3|G#4,E5|B3|G#4,E5|B3|G#4,E5|A3|F#4,E5|A3|F#4,E5|A3|F#4,E5|C4|A4,E5|C4|A4,E5|C4|A4,E5|B3|G#4,E5|B3|G#4".repeat(10) },
        { t: "Swan Lake", a: "Tchaikovsky", p: "A4|A2,E5|C3,D5|E3,C5|A3,B4|E3,A4|C3,B4|E3,C5|A2,D5|B2,E5|C3,F5|D3,E5|C3,B4|E3,A4|C3,G#4|E3,A4|A2,E5|C3,D5|E3,C5|A3,B4|E3,A4|C3".repeat(6) },
        { t: "Lacrimosa", a: "Mozart", p: "D4|D2,E4|A2,F4|D3,G4|B2,A4|D3,Bb4|G2,A4|F2,G4|E2,F4|D2,E4|A2,D4|D2,C#4|A1,D4|D2,E4|E2,F4|F2,G4|G2,A4|A2,D5|D3,C#5|A2,D5|D2,E5|E2,F5|F2".repeat(6) }
    ];

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let piano, lives = 10, score = 0, isPlaying = false, selected = 0;
    
    // ⚙️ 지피티 제안 반영: 난이도별 설정값 중앙 관리
    const difficultySettings = {
        '하': { speed: 280, accel: 0.005, max: 380 },
        '중': { speed: 520, accel: 0.15, max: 880 },
        '상': { speed: 850, accel: 0.5, max: 2300 }
    };

    let difficulty = '중';
    let speed = difficultySettings['중'].speed;
    let accelRate = difficultySettings['중'].accel;
    let maxSpeed = difficultySettings['중'].max;

    let tiles = [], particles = [], lastTime = 0;

    function resize() { canvas.width = Math.min(window.innerWidth, 500); canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    // 🎧 벨벳 레가토 사운드 체인
    const limiter = new Tone.Limiter(-4).toDestination();
    const mainGain = new Tone.Gain(0.6).connect(limiter);
    const softFilter = new Tone.Filter(3200, "lowpass").connect(mainGain);
    const hall = new Tone.Reverb({ decay: 3.5, wet: 0.25 }).connect(softFilter);
    
    piano = new Tone.Sampler({
        urls: {
            "A0": "A0.mp3", "C1": "C1.mp3", "D#1": "Ds1.mp3", "F#1": "Fs1.mp3", "A1": "A1.mp3",
            "C2": "C2.mp3", "D#2": "Ds2.mp3", "F#2": "Fs2.mp3", "A2": "A2.mp3",
            "C3": "C3.mp3", "D#3": "Ds3.mp3", "F#3": "Fs3.mp3", "A3": "A3.mp3",
            "C4": "C4.mp3", "D#4": "Ds4.mp3", "F#4": "Fs4.mp3", "A4": "A4.mp3",
            "C5": "C5.mp3", "D#5": "Ds5.mp3", "F#5": "Fs5.mp3", "A5": "A5.mp3",
            "C6": "C6.mp3", "D#6": "Ds6.mp3", "F#6": "Fs6.mp3", "A6": "A6.mp3",
            "C7": "C7.mp3", "D#7": "Ds7.mp3", "F#7": "Fs7.mp3", "A7": "A7.mp3", "C8": "C8.mp3"
        },
        release: 2.8,
        baseUrl: "https://tonejs.github.io/audio/salamander/",
        onload: () => { document.getElementById('start-btn').innerText = "연주 시작하기"; }
    }).connect(hall);

    // ✅ 지피티 제안: 난이도 버튼 클릭 즉시 모든 수치 업데이트!
    document.querySelectorAll('.diff-btn').forEach(btn => {
        btn.onclick = (e) => {
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active'); 
            difficulty = e.target.dataset.diff.trim();
            
            // 수치 즉시 동기화
            const set = difficultySettings[difficulty];
            speed = set.speed;
            accelRate = set.accel;
            maxSpeed = set.max;
        };
    });

    function renderSongList() {
        const list = document.getElementById('song-list'); list.innerHTML = "";
        songs.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = `song-item ${i === selected ? 'active' : ''}`;
            div.innerHTML = `<strong>${s.t}</strong><br><small>${s.a}</small>`;
            div.onclick = () => { selected = i; renderSongList(); };
            list.appendChild(div);
        });
    }
    renderSongList();

    document.getElementById('start-btn').onclick = async () => {
        await Tone.start(); isPlaying = true; tiles = []; score = 0; lives = 10;
        
        // 다시 한번 확정 (공백 방지)
        const set = difficultySettings[difficulty] || difficultySettings['중'];
        speed = set.speed;
        accelRate = set.accel;
        maxSpeed = set.max;

        document.getElementById('hearts').innerText = '❤️'.repeat(lives);
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        for(let i=0; i<6; i++) spawnTile(canvas.height - (i + 1) * (canvas.height/4));
        lastTime = performance.now();
        animate();
    };

    function spawnTile(yPos) {
        const songNotes = songs[selected].p.split(',');
        const noteData = songNotes[score % songNotes.length];
        tiles.push({
            lane: Math.floor(Math.random() * 4),
            y: yPos || tiles[tiles.length-1].y - canvas.height/4,
            h: canvas.height/4,
            note: noteData ? noteData.split('|') : ["C4"],
            hit: false
        });
    }

    function animate(now = performance.now()) {
        if(!isPlaying) return;
        const dt = (now - lastTime) / 1000;
        lastTime = now;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = "rgba(255,255,255,0.15)";
        for(let i=1; i<4; i++) {
            ctx.beginPath(); ctx.moveTo(i * canvas.width/4, 0); ctx.lineTo(i * canvas.width/4, canvas.height); ctx.stroke();
        }

        for(let i = tiles.length - 1; i >= 0; i--) {
            const t = tiles[i]; t.y += speed * dt;
            ctx.fillStyle = t.hit ? "rgba(255,255,255,0.4)" : "#1a1a1a";
            ctx.fillRect(t.lane * canvas.width/4 + 3, t.y + 3, canvas.width/4 - 6, t.h - 6);
            if(t.y > canvas.height) {
                if(!t.hit) { lives--; document.getElementById('hearts').innerText = '❤️'.repeat(Math.max(0, lives)); }
                tiles.splice(i, 1); spawnTile();
                if(lives <= 0) { isPlaying = false; location.reload(); }
            }
        }

        for(let i = particles.length-1; i >= 0; i--) {
            const p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.05;
            if(p.life <= 0) particles.splice(i, 1);
            else { ctx.fillStyle = `rgba(255,255,255,${p.life})`; ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill(); }
        }

        if(speed < maxSpeed) speed += accelRate; 
        requestAnimationFrame(animate);
    }

    canvas.addEventListener('pointerdown', (e) => {
        if(!isPlaying) return;
        const rect = canvas.getBoundingClientRect();
        const tx = (e.clientX || e.touches[0].clientX) - rect.left;
        const ty = (e.clientY || e.touches[0].clientY) - rect.top;
        const lane = Math.floor(tx / (canvas.width / 4));
        let target = null; let lowestY = -Infinity;
        tiles.forEach(t => { if(!t.hit && t.y > lowestY) { lowestY = t.y; target = t; } });

        if(target && target.lane === lane && target.y + target.h > canvas.height * 0.45) {
            target.hit = true; score++;
            document.getElementById('score').innerText = score;
            const velocity = Math.random() * 0.15 + 0.45; 
            piano.triggerAttackRelease(target.note, "2n", undefined, velocity);
            for(let i=0; i<10; i++) particles.push({ x: tx, y: ty, vx: Math.random()*12-6, vy: Math.random()*12-6, life: 1 });
        } else {
            lives--; document.getElementById('hearts').innerText = '❤️'.repeat(Math.max(0, lives));
            if(lives <= 0) { isPlaying = false; location.reload(); }
        }
    });
</script>
</body>
</html>
