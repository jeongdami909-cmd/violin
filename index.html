<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Violin Maestro V63 - Real Stradivarius</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --main: #fffaf0; --gold: #d4af37; --pink: #ff85c0; }
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #fdfdfd; height: 100dvh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        /* 눈부시게 밝고 화사한 무대 */
        canvas { 
            background: linear-gradient(135deg, #ffffff 0%, #fff0f5 60%, #fff9e6 100%); 
            width: 100%; height: 100%; max-width: 500px;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.15);
        }

        .ui-layer { position: absolute; top: 0; left: 50%; width: 100%; height: 100%; max-width: 500px; transform: translateX(-50%); pointer-events: none; z-index: 10; }
        #lobby, #result { pointer-events: auto; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(25px); display: flex; flex-direction: column; padding: 35px; color: #444; height: 100%; width: 100%; justify-content: center; }
        
        h1 { text-align: center; font-size: 26px; font-weight: 900; color: var(--gold); text-shadow: 1px 1px 3px rgba(0,0,0,0.05); margin-bottom: 25px; }
        #song-list { flex: 1; overflow-y: auto; background: rgba(255, 255, 255, 0.4); border-radius: 25px; padding: 10px; margin-bottom: 25px; border: 1px solid #f0f0f0; }
        .song-item { padding: 16px; border-radius: 15px; margin-bottom: 10px; background: #fff; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid #eee; transition: 0.2s; }
        .song-item.active { background: #fffaf0; border-color: var(--gold); color: var(--gold); font-weight: 900; box-shadow: 0 4px 12px rgba(212, 175, 55, 0.1); }
        
        .btn { width: 100%; padding: 22px; border-radius: 60px; border: none; font-size: 20px; font-weight: 900; background: var(--gold); color: #fff; cursor: pointer; pointer-events: auto; box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3); transition: 0.2s; }
        .btn:active { transform: scale(0.97); }
        
        #game-ui { display: none; height: 100%; width: 100%; position: relative; }
        #score-display { text-align: center; font-size: 60px; font-weight: 900; color: var(--gold); text-shadow: 0 4px 15px rgba(255,255,255,0.8); padding-top: 60px; }
        #progress-bar { width: 0%; height: 6px; background: var(--gold); box-shadow: 0 0 10px var(--gold); position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

</div>

        { t: "Minuet (Bach)", lv: "중", p: "D5,G4,A4,B4,C5,D5,G4,G4,E5,C5,D5,E5,F#5,G5,G4,G4,C5,D5,C5,B4,A4,B4,C5,B4,A4,G4,F#4,G4,A4,B4,G4,B4,A4,D5,G4,A4,B4,C5,D5,G4,G4,E5,C5,D5,E5,F#5,G5,G4,G4,A4,B4,C5,D5,E5,F5,G5,A5,B5,C6,D6,B5,G5,C5,D5,E5,F5,G5,A5,B5,C6,D6,C6,B5,A5,G5,F5,E5,D5,C5,B4,A4,G4,B4,D5,G5,B5,D6", time: 100 }
    ];

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let violin, lives = 6, score = 0, speed = 3.5, accel = 0.0001, isPlaying = false, selected = 0;
    let tiles = [], nextNoteIndex = 0, startTime, particles = [], laneGlow = [0, 0, 0, 0];
    let prevLane = -1;

    // 🎻 지능형 레인 배치 (기차 방지 및 선율 시각화)
    function getLaneFromNote(note) {
        const notes = ["G3","A3","B3","C4","D4","E4","F4","G4","A4","B4","C5","D5","E5","F#5","F5","G5","Ab5","A5","Bb5","B5","C6","D6","E6","F6","G6","A6","B6","C7","D7","E7","F7","G7","A7","B7","C8"];
        let idx = notes.indexOf(note);
        if (idx === -1) idx = 15;
        let lane = Math.floor((idx / notes.length) * 4);
        if (lane === prevLane) lane = (lane + 1) % 4; // 지그재그
        prevLane = lane;
        return lane;
    }

    function resize() {
        canvas.width = Math.min(window.innerWidth, 500);
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // 🎻 스트라디바리우스 리얼 사운드 튜닝 (에코 제거, 선명함 극대화)
    const hall = new Tone.Reverb({ decay: 1.0, wet: 0.1 }).toDestination(); // 에코를 확 줄임
    violin = new Tone.Sampler({
        urls: { "G4": "G4.mp3", "C5": "C5.mp3", "E5": "E5.mp3", "G5": "G5.mp3", "A5": "A5.mp3", "D6": "D6.mp3" },
        release: 1.2, // 자연스러운 여운
        baseUrl: "https://gleitz.github.io/midi-js-soundfonts/FatBoy/violin-mp3/",
        onload: () => { document.getElementById('start-btn').innerText = "무대 무대 입장 ✨"; }
    }).connect(hall);

    function spawnTile(yPos) {
        const songNotes = songs[selected].p.split(',');
        const note = songNotes[nextNoteIndex % songNotes.length];
        const lane = getLaneFromNote(note);
        tiles.push({ lane: lane, y: yPos || -canvas.height/4, h: canvas.height/4, note: note, hit: false });
        nextNoteIndex++;
    }

    function animate() {
        if(!isPlaying) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 레인 글로우 (황금빛 활 선율)
        laneGlow.forEach((g, i) => {
            if(g > 0) {
                let grad = ctx.createLinearGradient(0, canvas.height, 0, 0);
                grad.addColorStop(0, `rgba(212, 175, 55, ${g * 0.4})`);
                grad.addColorStop(1, "rgba(255, 255, 255, 0)");
                ctx.fillStyle = grad; ctx.fillRect(i * canvas.width/4, 0, canvas.width/4, canvas.height);
                laneGlow[i] -= 0.05;
            }
        });

        tiles.forEach((t, i) => {
            t.y += speed;
            const x = t.lane * canvas.width/4;
            if(t.hit) {
                ctx.fillStyle = "rgba(212, 175, 55, 0.2)"; ctx.fillRect(x, t.y, canvas.width/4, t.h);
            } else {
                ctx.fillStyle = "#2c3e50"; // 명확하고 세련된 타일
                drawRoundedRect(ctx, x + 8, t.y + 8, canvas.width/4 - 16, t.h - 16, 12);
            }

            if(t.y > canvas.height) {
                if(!t.hit) lives--; 
                tiles.splice(i, 1);
                spawnTile(tiles.length > 0 ? tiles[tiles.length-1].y - canvas.height/4 : -canvas.height/4);
                if(lives <= 0) endConcert(false);
            }
        });

        let elapsed = (Date.now() - startTime) / 1000;
        let progress = (elapsed / songs[selected].time) * 100;
        document.getElementById('progress-bar').style.width = Math.min(100, progress) + "%";
        if(progress >= 100 && tiles.every(t => t.hit || t.y > canvas.height)) endConcert(true);

        particles.forEach((p, idx) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            if(p.life <= 0) particles.splice(idx, 1);
            else {
                ctx.fillStyle = `rgba(212, 175, 55, ${p.life})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
            }
        });

        speed += accel;
        if(isPlaying) requestAnimationFrame(animate);
    }

    function drawRoundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath(); ctx.moveTo(x + radius, y); ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius); ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height); ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius); ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y); ctx.closePath(); ctx.fill();
    }

    canvas.addEventListener('pointerdown', (e) => {
        if(!isPlaying) return;
        const rect = canvas.getBoundingClientRect();
        const tx = e.clientX - rect.left;
        const ty = e.clientY - rect.top;
        const lane = Math.floor(tx / (canvas.width / 4));

        let target = tiles.find(t => !t.hit && t.y + t.h > canvas.height * 0.4);
        if(target && target.lane === lane) {
            target.hit = true; score++;
            document.getElementById('score-display').innerText = score;
            laneGlow[lane] = 1.0;
            for(let i=0; i<15; i++) particles.push({ x: tx, y: ty, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1.0 });
            
            // 🎻 심리스 레가토: 소리가 끊기지 않고 다음 음까지 연결
            violin.triggerAttackRelease(target.note, "2n", undefined, Math.random()*0.2 + 0.8);
        } else {
            lives--; if(lives <= 0) endConcert(false);
        }
    });

    function endConcert(win) {
        isPlaying = false;
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('result').style.display = 'flex';
        document.getElementById('final-score').innerText = score;
    }

    function renderSongs() {
        const list = document.getElementById('song-list');
        list.innerHTML = "";
        songs.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = `song-item ${i === selected ? 'active' : ''}`;
            div.innerHTML = `<span>${s.t}</span><small style="color:var(--gold)">Score Master</small>`;
            div.onclick = () => { selected = i; renderSongs(); };
            list.appendChild(div);
        });
    }
    renderSongs();

    document.getElementById('start-btn').onclick = async () => {
        await Tone.start();
        isPlaying = true; tiles = []; score = 0; lives = 6; nextNoteIndex = 0; startTime = Date.now();
        
        const lv = songs[selected].lv;
        if(lv === "하") { speed = 3.2; accel = 0.00008; }
        else if(lv === "중") { speed = 4.0; accel = 0.00015; }
        else { speed = 5.2; accel = 0.0003; }

        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        for(let i=0; i<5; i++) spawnTile(canvas.height - (i + 1) * (canvas.height/4));
        animate();
    };
    document.getElementById('retry-btn').onclick = () => location.reload();
</script>
</body>
</html>
