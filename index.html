<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Violin Maestro V73 - Heifetz & Vengerov Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --gold: #d4af37; --pink: #ff85c0; --pearl: #ffffff; --soft-pink: #ffeef4; }
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #fff; height: 100dvh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        /* 눈부시게 밝고 화사한 진주빛 무대 */
        canvas { 
            background: linear-gradient(135deg, #ffffff 0%, #fff5f8 50%, #fff9e6 100%); 
            width: 100%; height: 100%; max-width: 500px;
            box-shadow: 0 0 60px rgba(212, 175, 55, 0.2);
        }

        .ui-layer { position: absolute; top: 0; left: 50%; width: 100%; height: 100%; max-width: 500px; transform: translateX(-50%); pointer-events: none; z-index: 10; }
        #lobby, #result { pointer-events: auto; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(25px); display: flex; flex-direction: column; padding: 35px; color: #444; height: 100%; width: 100%; justify-content: center; }
        
        h1 { text-align: center; font-size: 24px; font-weight: 900; color: var(--gold); text-shadow: 1px 1px 2px rgba(0,0,0,0.05); margin-bottom: 20px; }
        #song-list { flex: 1; overflow-y: auto; background: rgba(255, 255, 255, 0.6); border-radius: 25px; padding: 10px; margin-bottom: 20px; border: 1px solid var(--soft-pink); }
        .song-item { padding: 16px; border-radius: 15px; margin-bottom: 10px; background: #fff; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid #eee; transition: 0.2s; }
        .song-item.active { background: #fffdf5; border-color: var(--gold); color: var(--gold); font-weight: 900; box-shadow: 0 4px 12px rgba(212, 175, 55, 0.1); }
        
        .lv-badge { font-size: 10px; padding: 4px 10px; border-radius: 12px; color: #fff; font-weight: 900; }
        .lv-하 { background: #b7e4c7; } .lv-중 { background: #ade8f4; } .lv-상 { background: #fca311; }

        .btn { width: 100%; padding: 22px; border-radius: 60px; border: none; font-size: 20px; font-weight: 900; background: var(--gold); color: #fff; cursor: pointer; pointer-events: auto; box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3); }
        .btn:disabled { opacity: 0.5; cursor: wait; }
        
        #game-ui { display: none; height: 100%; width: 100%; position: relative; }
        #heart-container { position: absolute; top: 60px; left: 20px; display: flex; gap: 4px; }
        .heart { font-size: 18px; color: var(--pink); text-shadow: 0 0 5px #fff; }
        #score-display { text-align: center; font-size: 60px; font-weight: 900; color: var(--gold); padding-top: 80px; }
        #progress-bar { width: 0%; height: 8px; background: var(--gold); box-shadow: 0 0 10px var(--gold); position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div class="ui-layer">
    <div id="lobby">
        <h1>🎻 Stradivarius Concert ✨</h1>
        <div id="song-list"></div>
        <button id="start-btn" class="btn" disabled>바이올린 조율 중...</button>
    </div>

    <div id="game-ui">
        <div id="progress-bar"></div>
        <div id="heart-container"></div>
        <div id="score-display">0</div>
    </div>

    <div id="result" style="display:none; text-align:center;">
        <h1 style="font-size: 28px; color: var(--gold);">Greatest Maestro! ✨</h1>
        <div id="final-score" style="font-size: 80px; font-weight: 900; margin: 25px 0; color: var(--gold);">0</div>
        <button id="retry-btn" class="btn">다시 무대로 입장</button>
    </div>
</div>

        { t: "Mozart: Variations (Complete)", lv: "하", p: "C4,C4,G4,G4,A4,A4,G4,F4,F4,E4,E4,D4,D4,C4,G4,G4,F4,F4,E4,E4,D4,G4,G4,F4,F4,E4,E4,D4,C4,C4,G4,G4,A4,A4,G4,F4,F4,E4,E4,D4,D4,C4,C5,E5,G5,C6,G5,E5,C5,G4,A4,B4,C5,D5,E5,F5,G5,A5,B5,C6,B5,A5,G5,F5,E5,D5,C5,G5,G5,F5,F5,E5,E5,D5,G5,G5,F5,F5,E5,E5,D5,C5,C5", time: 140 },

        { t: "Bach: Air on G String", lv: "하", p: "F#5,F#4,E5,E4,D5,D4,C#5,C#4,B4,A4,G4,F#4,E4,D4,C#4,B3,A3,G3,F#3,E3,D3,E3,F#3,G3,A3,B3,C#4,D4,E4,F#4,G4,A4,B4,C#5,D5,E5,F#5,G5,A5,B5,C#6,D6,E6,F#6,G6,A6,B6,C7,D7,E7,F#7,G7,A7,B7,C8", time: 150 },
        { t: "Mozart: Turkish March", lv: "상", p: "B4,A4,G#4,A4,C5,D5,C5,B4,C5,E5,F5,E5,D#5,E5,G5,A5,G5,F#5,G5,C6,B5,A5,G#5,A5,C6,A5,G5,F#5,G5,B5,G5,F5,E5,D5,E5,C5,D5,B4,C5,A4,B4,G#4,A4,E5,E5,F5,E5,D#5,E5,G5,A5,G5,F#5,G5,C6,D6,C6,B5,A5,G#5,A5,B5,C6,D6,E6,F#6,G6,A6,B6,C7,A6,G6,F#6,E6,D6,C6,B5,A5", time: 135 },
        { t: "Pachelbel: Canon in D", lv: "중", p: "F#5,E5,D5,C#5,B4,A4,B4,C#5,D5,F#5,A5,G5,F#5,D5,F#5,E5,D5,C#5,B4,A4,B4,C#5,D5,D4,E4,F#4,G4,A4,B4,C#5,D5,E5,F#5,G5,A5,B5,A5,G5,F#5,G5,A5,D5,F#5,A5,B5,G5,A5,F#5,D5,E5,F#5,G5,A5,B5,C#6,D6,D5,E5,F#5,G5,A5,B5,C#6,D6,E6,F#6,G6,A6,B6,C7", time: 150 },
        { t: "Schubert: Ave Maria", lv: "하", p: "Bb4,Bb4,D5,F5,Bb5,A5,G5,F5,Eb5,D5,C5,Bb4,A4,Bb4,C5,F4,Bb4,D5,F5,Bb5,D6,C6,Bb5,A5,G5,F5,G5,A5,Bb5,F5,Bb5,D6,F6,Eb6,D6,C6,Bb5,A5,Bb5,C6,F5,D6,Bb5,G5,F5,Eb5,D5,C5,Bb4,A4,Bb4,D5,F5,Bb5,D6,F6,G6,F6,D6,Bb5,F5,D5,Bb4", time: 140 },
        { t: "Bizet: Carmen Habanera", lv: "상", p: "D4,D4,C4,B3,A3,G#3,A3,B3,C4,D4,E4,F4,G4,A4,B4,C5,D5,E5,F5,G5,A5,F5,D5,B4,G4,E4,C4,B3,A3,G3,A3,B3,C4,D4,E4,F4,G4,A4,B4,C5,D5,E5,F5,G5,A5,B5,C6,D6,E6,F6,G6,A6,B6,C7,D7,E7,F7,G7,A7", time: 145 },
        { t: "Elgar: Salut d'Amour", lv: "중", p: "E5,F#5,G5,A5,B5,C6,D6,B5,G5,E5,C5,A4,F#4,D4,E5,F#5,G5,A5,B5,C6,D6,B5,G5,E5,C5,D5,E5,F5,G5,A5,B5,C6,D6,E6,F6,G6,A6,B6,C7,Bb6,A6,G6,F6,E6,D6,C6,B5,A5,G5,F5,E5,D5,C5,B4,A4,G4,F4,E4,D4,C4", time: 140 },
        { t: "Gossec: Gavotte", lv: "하", p: "D5,G5,F#5,G5,A5,G5,F#5,G5,B5,A5,G5,F#5,E5,D5,C5,B4,A4,G4,A4,B4,C5,D5,E5,F#5,G5,A5,B5,C6,D6,E6,D6,C6,B5,A5,G5,F#5,E5,D5,C5,B4,A4,G3,D4,G4,B4,D5,G5,A5,B5,C6,D6,E6,F#6,G6,A6,B6,C7", time: 120 }
    ];

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let violin, lives = 10, score = 0, speed = 3.2, accel = 0.0001, isPlaying = false, selected = 0;
    let tiles = [], nextNoteIndex = 0, startTime, particles = [], laneGlow = [0, 0, 0, 0];
    let prevLane = -1, lastNote = null;

    function getLaneFromNote(note) {
        const notes = ["G2","A2","B2","C3","D3","E3","F3","G3","A3","B3","C4","C#4","D4","Eb4","E4","F4","F#4","G4","Ab4","A4","Bb4","B4","C5","C#5","D5","Eb5","E5","F5","F#5","G5","Ab5","A5","Bb5","B5","C6","C#6","D6","Eb6","E6","F6","F#6","G6","Ab6","A6","Bb6","B6","C7","D7","E7","F7","G7","A7","B7","C8","D8","E8","F8","G8","A8","B8","C9"];
        let idx = notes.indexOf(note);
        if (idx === -1) idx = 35;
        let lane = Math.floor((idx / notes.length) * 4);
        if (lane === prevLane) lane = (lane + 1) % 4;
        prevLane = lane;
        return lane;
    }

    function resize() {
        canvas.width = Math.min(window.innerWidth, 500);
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // 🎻 사운드 엔진: Pure Stradivarius Legato (에코 제거, 선명함 극대화)
    const eq = new Tone.EQ3({ low: -12, mid: 1, high: 15 }).toDestination();
    violin = new Tone.Sampler({
        urls: { "G3": "G3.mp3", "C4": "C4.mp3", "E4": "E4.mp3", "G4": "G4.mp3", "C5": "C5.mp3", "E5": "E5.mp3", "G5": "G5.mp3", "C6": "C6.mp3", "E6": "E6.mp3" },
        release: 0.5,
        baseUrl: "https://gleitz.github.io/midi-js-soundfonts/FluidR3_GM/violin-mp3/",
        onload: () => { 
            const btn = document.getElementById('start-btn');
            btn.disabled = false;
            btn.innerText = "Maestro 대공연 입장 ✨"; 
        }
    }).connect(eq);

    function spawnTile(yPos) {
        const songNotes = songs[selected].p.split(',');
        const note = songNotes[nextNoteIndex % songNotes.length];
        const lane = getLaneFromNote(note);
        tiles.push({ lane: lane, y: yPos || -canvas.height/4, h: canvas.height/4, note: note, hit: false });
        nextNoteIndex++;
    }

    function updateHearts() {
        const container = document.getElementById('heart-container');
        container.innerHTML = "🩷".repeat(lives);
    }

    function animate() {
        if(!isPlaying) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        laneGlow.forEach((g, i) => {
            if(g > 0) {
                let grad = ctx.createLinearGradient(0, canvas.height, 0, 0);
                grad.addColorStop(0, `rgba(212, 175, 55, ${g * 0.4})`);
                grad.addColorStop(1, "rgba(255, 255, 255, 0)");
                ctx.fillStyle = grad; ctx.fillRect(i * canvas.width/4, 0, canvas.width/4, canvas.height);
                laneGlow[i] -= 0.05;
            }
        });

        for (let i = tiles.length - 1; i >= 0; i--) {
            const t = tiles[i];
            t.y += speed;
            const x = t.lane * canvas.width/4;
            if(t.hit) {
                ctx.fillStyle = "rgba(197, 160, 89, 0.2)"; ctx.fillRect(x, t.y, canvas.width/4, t.h);
            } else {
                ctx.fillStyle = "#333"; 
                drawRoundedRect(ctx, x + 10, t.y + 10, canvas.width/4 - 20, t.h - 20, 15);
            }

            if(t.y > canvas.height) {
                if(!t.hit) {
                    lives--; updateHearts();
                    if(lives <= 0) endConcert(false);
                }
                tiles.splice(i, 1);
                spawnTile(tiles.length > 0 ? tiles[tiles.length-1].y - canvas.height/4 : -canvas.height/4);
            }
        }

        let elapsed = (Date.now() - startTime) / 1000;
        let progress = (elapsed / songs[selected].time) * 100;
        document.getElementById('progress-bar').style.width = Math.min(100, progress) + "%";
        if(progress >= 100 && tiles.every(t => t.hit || t.y > canvas.height)) endConcert(true);

        particles.forEach((p, idx) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.025;
            if(p.life <= 0) particles.splice(idx, 1);
            else {
                ctx.fillStyle = `rgba(212, 175, 55, ${p.life})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, Math.PI*2); ctx.fill();
            }
        });

        speed += accel;
        if(isPlaying) requestAnimationFrame(animate);
    }

    function drawRoundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath(); ctx.moveTo(x + radius, y); ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius); ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height); ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius); ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y); ctx.closePath(); ctx.fill();
    }

    canvas.addEventListener('pointerdown', (e) => {
        if(!isPlaying) return;
        const rect = canvas.getBoundingClientRect();
        const tx = e.clientX - rect.left;
        const ty = e.clientY - rect.top;
        const lane = Math.floor(tx / (canvas.width / 4));

        let target = tiles.find(t => !t.hit && t.y + t.h > canvas.height * 0.4);
        if(target && target.lane === lane) {
            target.hit = true; score++;
            document.getElementById('score-display').innerText = score;
            laneGlow[lane] = 1.0;
            for(let i=0; i<12; i++) particles.push({ x: tx, y: ty, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, life: 1.0 });
            
            if (lastNote) violin.triggerRelease(lastNote, "+0.02"); 
            violin.triggerAttack(target.note, Tone.now(), Math.random()*0.3 + 0.75);
            lastNote = target.note;

        } else {
            lives--; updateHearts();
            if(lives <= 0) endConcert(false);
        }
    });

    function endConcert(win) {
        isPlaying = false;
        if (lastNote) violin.triggerRelease(lastNote);
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('result').style.display = 'flex';
        document.getElementById('final-score').innerText = score;
    }

    function renderSongs() {
        const list = document.getElementById('song-list');
        list.innerHTML = "";
        songs.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = `song-item ${i === selected ? 'active' : ''}`;
            div.innerHTML = `<span>${s.t}</span><span class="lv-badge lv-${s.lv}">${s.lv}</span>`;
            div.onclick = () => { selected = i; renderSongs(); };
            list.appendChild(div);
        });
    }
    renderSongs();

    document.getElementById('start-btn').onclick = async () => {
        await Tone.start();
        isPlaying = true; tiles = []; score = 0; lives = 10; nextNoteIndex = 0; startTime = Date.now(); lastNote = null;
        updateHearts();
        
        const lv = songs[selected].lv;
        if(lv === "하") { speed = 3.2; accel = 0.00004; }
        else if(lv === "중") { speed = 4.2; accel = 0.0001; }
        else { speed = 5.5; accel = 0.00025; }

        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        for(let i=0; i<5; i++) spawnTile(canvas.height - (i + 1) * (canvas.height/4));
        animate();
    };
    document.getElementById('retry-btn').onclick = () => location.reload();
</script>
</body>
</html>
