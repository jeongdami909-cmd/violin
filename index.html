<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Violin Tiles - Canvas Master</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --wood: #d4a373; --gold: #f4d03f; }
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; height: 100dvh; overflow: hidden; touch-action: none; display: flex; justify-content: center; align-items: center; }
        
        canvas { background: linear-gradient(180deg, #e9c46a 0%, #f4a261 100%); width: 100%; height: 100%; max-width: 500px; border-left: 1px solid rgba(255,255,255,0.3); border-right: 1px solid rgba(255,255,255,0.3); }

        .ui-layer { position: absolute; top: 0; left: 50%; width: 100%; height: 100%; max-width: 500px; transform: translateX(-50%); pointer-events: none; z-index: 10; display: flex; flex-direction: column; }
        #lobby, #game-over-screen { pointer-events: auto; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; padding: 20px; color: #fff; height: 100%; justify-content: center; }
        
        #game-over-screen { display: none; align-items: center; text-align: center; }
        #final-score { font-size: 50px; color: var(--gold); font-weight: 900; margin: 20px 0; }
        
        h1 { text-align: center; font-size: 24px; font-weight: 900; text-shadow: 0 0 10px var(--gold); padding: 20px 0; color: var(--gold); }
        #song-list { flex: 1; overflow-y: auto; background: rgba(255,255,255,0.1); border-radius: 20px; padding: 10px; margin-bottom: 20px; width: 100%; }
        .song-item { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 5px; background: rgba(0,0,0,0.4); text-align: left; }
        .song-item.active { background: var(--gold); color: #000; font-weight: bold; }
        .btn { width: 100%; padding: 20px; border-radius: 50px; border: none; font-size: 20px; font-weight: 900; background: var(--gold); color: #000; cursor: pointer; pointer-events: auto; }
        
        #game-ui { display: none; padding: 20px; height: 100%; position: relative; }
        #score { text-align: center; font-size: 60px; font-weight: 900; color: #fff; text-shadow: 0 4px 10px rgba(0,0,0,0.5); margin-top: 40px;}
        #hearts { font-size: 24px; color: #fff; position: absolute; top: 20px; left: 20px; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div class="ui-layer">
    <div id="lobby">
        <h1>VIOLIN MAESTRO</h1>
        <div id="song-list"></div>
        <button id="start-btn" class="btn">악기 조율 중...</button>
    </div>

    <div id="game-ui">
        <div id="hearts">🎻🎻🎻🎻🎻🎻</div>
        <div id="score">0</div>
    </div>

    <div id="game-over-screen">
        <h1>연주 종료!</h1>
        <p>당신의 점수는...</p>
        <div id="final-score">0</div>
        <button id="retry-btn" class="btn">다시 연주하기</button>
    </div>
</div>

<script>
    const songs = [
        { t: "Spring (Four Seasons)", a: "Vivaldi", p: "E5|C4,E5|C4,E5|C4,D5|G3,C5|E3,G4|C3,G4|C3,C5|E3,D5|G3,E5|C4" },
        { t: "Caprice No. 24", a: "Paganini", p: "A4|A2,C5|E3,B4|E3,A4|A2,G#4|E2,B4|E3,A4|A2,C5|A3,B4|G3,A4|F3" },
        { t: "La Campanella", a: "Liszt", p: "D#6|D#4,D#6|A#4,D#6|B4,D#6|D#5,D#6|D#4,D#6|A#4,C#6|F#4,B5|D#4,A#5|F4,G#5|D#4,F#5|B3,E5|G#3,D#5|D#3" },
        { t: "River Flows in You", a: "Yiruma", p: "F#5|F#3,E5|A3,F#5|C#4,C#5|F#4,F#5|D3,E5|A3,F#5|D4,C#5|A4" }
    ];

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let violin, lives = 6, score = 0, speed = 4, isPlaying = false, selected = 0;
    let tiles = [];

    function resize() {
        canvas.width = Math.min(window.innerWidth, 500);
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const hall = new Tone.Reverb({ decay: 2.5, wet: 0.3 }).toDestination();
    violin = new Tone.Sampler({
        urls: { "G4": "G4.mp3", "C5": "C5.mp3", "E5": "E5.mp3", "G5": "G5.mp3" },
        release: 1.5,
        baseUrl: "https://gleitz.github.io/midi-js-soundfonts/FatBoy/violin-mp3/",
        onload: () => { document.getElementById('start-btn').innerText = "바이올린 연주 시작"; }
    }).connect(hall);

    function renderSongList() {
        const list = document.getElementById('song-list');
        list.innerHTML = "";
        songs.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = `song-item ${i === selected ? 'active' : ''}`;
            div.innerHTML = `<strong>${s.t}</strong><br><small>${s.a}</small>`;
            div.onclick = () => { selected = i; renderSongList(); };
            list.appendChild(div);
        });
    }
    renderSongList();

    function startGame() {
        Tone.start();
        isPlaying = true;
        tiles = []; score = 0; lives = 6; speed = 4;
        
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-over-screen').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        document.getElementById('score').innerText = score;
        document.getElementById('hearts').innerText = '🎻'.repeat(lives);
        
        for(let i=0; i<5; i++) spawnTile(canvas.height - (i + 1) * (canvas.height/4));
        animate();
    }

    document.getElementById('start-btn').onclick = startGame;
    document.getElementById('retry-btn').onclick = () => {
        document.getElementById('game-over-screen').style.display = 'none';
        document.getElementById('lobby').style.display = 'flex';
    };

    function spawnTile(yPos) {
        const songNotes = songs[selected].p.split(',');
        const noteIndex = Math.floor(Math.random() * songNotes.length);
        tiles.push({
            lane: Math.floor(Math.random() * 4),
            y: yPos || -canvas.height/4,
            h: canvas.height/4,
            note: songNotes[noteIndex].split('|'),
            hit: false
        });
    }

    function gameOver() {
        isPlaying = false;
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('game-over-screen').style.display = 'flex';
        document.getElementById('final-score').innerText = score;
    }

    function animate() {
        if(!isPlaying) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = "rgba(255,255,255,0.2)";
        for(let i=1; i<4; i++) {
            ctx.beginPath();
            ctx.moveTo(i * canvas.width/4, 0);
            ctx.lineTo(i * canvas.width/4, canvas.height);
            ctx.stroke();
        }

        // 판정선 (화면 하단) 시각적 표시
        ctx.fillStyle = "rgba(255, 255, 255, 0.1)";
        ctx.fillRect(0, canvas.height * 0.6, canvas.width, canvas.height * 0.4);
        ctx.strokeStyle = "rgba(244, 208, 63, 0.5)";
        ctx.beginPath();
        ctx.moveTo(0, canvas.height * 0.6);
        ctx.lineTo(canvas.width, canvas.height * 0.6);
        ctx.stroke();

        for(let i = tiles.length - 1; i >= 0; i--) {
            const t = tiles[i];
            t.y += speed;

            ctx.fillStyle = t.hit ? "rgba(244, 208, 63, 0.5)" : "#3e2723";
            ctx.fillRect(t.lane * canvas.width/4, t.y, canvas.width/4, t.h);
            ctx.strokeStyle = "#1a0f00";
            ctx.strokeRect(t.lane * canvas.width/4, t.y, canvas.width/4, t.h);

            if(t.y > canvas.height && !t.hit) {
                tiles.splice(i, 1);
                lives--;
                document.getElementById('hearts').innerText = '🎻'.repeat(Math.max(0, lives));
                spawnTile(tiles[tiles.length-1].y - canvas.height/4);
                
                if(lives <= 0) {
                    gameOver();
                    return; // 게임 오버 시 애니메이션 즉시 중단
                }
            } else if(t.y > canvas.height && t.hit) {
                tiles.splice(i, 1);
                spawnTile(tiles[tiles.length-1].y - canvas.height/4);
            }
        }

        speed += 0.0005;
        if(isPlaying) requestAnimationFrame(animate);
    }

    canvas.addEventListener('pointerdown', (e) => {
        if(!isPlaying) return;
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top; // y좌표 추가
        const lane = Math.floor(x / (canvas.width / 4));

        let target = null;
        let lowestY = -Infinity;
        tiles.forEach(t => {
            if(!t.hit && t.y > lowestY) {
                lowestY = t.y;
                target = t;
            }
        });

        // 타일이 판정선(화면 60% 아래)에 진입했을 때만 터치 인정 (터치 범위 완화)
        if(target && target.lane === lane && (target.y + target.h > canvas.height * 0.5)) {
            target.hit = true;
            score++;
            document.getElementById('score').innerText = score;
            violin.triggerAttackRelease(target.note, "2n");
        } else {
            // 잘못 눌렀을 때의 패널티
            lives--;
            document.getElementById('hearts').innerText = '🎻'.repeat(Math.max(0, lives));
            if(lives <= 0) gameOver();
        }
    });
</script>
</body>
</html>
